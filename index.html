<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadLens — Квалификация лидов</title>
  <style>
    :root {
      /* Required design system variables */
      --bg-primary: #F7F5F3;
      --text-primary: #36332F;
      --primary: #6B7C8C;

      /* Supporting tokens */
      --surface: #FFFFFF;
      --surface-soft: #fcfbfa;
      --surface-contrast: #ffffff;
      --text-secondary: #6A6560;
      --text-muted: #7b756e;
      --border: #E8E3DE;
      --chip-bg: #ece8e3;
      --chip-border: #e4dbd2;
      --chip-text: #58524d;
      --track-bg: #ece7e1;
      --skipped-border: #d9d2cb;
      --script-border: #d9d2cb;
      --shadow: 0 4px 16px rgba(54, 51, 47, 0.08);
      --radius: 16px;
      --container: 1200px;

      /* Status tokens */
      --high: #c94f4f;
      --medium: #a6792f;
      --low: #667085;
      --success-soft: #e8f4ec;
      --success-text: #2f6f44;
      --warn-soft: #fff4e5;
      --warn-text: #946200;
      --danger-soft: #fdecec;
      --danger-text: #a33c3c;
    }

    [data-theme="dark"] {
      /* Requested dark palette */
      --bg-primary: #1a1a1a;
      --surface: #2d2d2d;
      --surface-soft: #3a3a3a;
      --surface-contrast: #2d2d2d;

      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #909090;

      --border: #404040;
      --chip-bg: #3a3a3a;
      --chip-border: #4f4f4f;
      --chip-text: #e0e0e0;
      --track-bg: #3a3a3a;
      --skipped-border: #5a5a5a;
      --script-border: #585858;

      /* Accent stays readable */
      --primary: #89a0b3;

      --high: #ff9a9a;
      --medium: #f0c98b;
      --low: #a6b3c2;
      --success-soft: #213b2c;
      --success-text: #98d8b0;
      --warn-soft: #3f3220;
      --warn-text: #ffd493;
      --danger-soft: #472727;
      --danger-text: #ffb5b5;

      --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 24px 16px 40px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .app {
      max-width: var(--container);
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand__logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .brand__tagline {
      font-size: 0.9rem;
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .btn--theme {
      width: 40px;
      height: 40px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      line-height: 1;
    }

    .btn--primary {
      background: var(--primary);
      color: #fff;
    }

    .btn--ghost {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border);
    }

    .btn--soft {
      background: color-mix(in srgb, var(--surface) 70%, var(--chip-bg) 30%);
      color: var(--text-primary);
      border-color: color-mix(in srgb, var(--border) 78%, var(--chip-border) 22%);
    }

    .btn--success {
      background: var(--success-soft);
      color: var(--success-text);
      border-color: color-mix(in srgb, var(--success-soft) 68%, var(--success-text) 32%);
    }

    .btn--warning {
      background: var(--warn-soft);
      color: var(--warn-text);
      border-color: color-mix(in srgb, var(--warn-soft) 68%, var(--warn-text) 32%);
    }

    .btn--danger {
      background: var(--danger-soft);
      color: var(--danger-text);
      border-color: color-mix(in srgb, var(--danger-soft) 68%, var(--danger-text) 32%);
    }

    .section {
      display: grid;
      gap: 16px;
    }

    .section__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section__title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section__title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .count-badge {
      min-width: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--chip-text);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    #leadsGrid,
    #skippedGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .section--collapsible {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: max-height 0.35s ease, opacity 0.25s ease, transform 0.25s ease;
    }

    .section--collapsible.is-visible {
      max-height: 2000px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .lead-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 12px;
      transition: opacity 0.3s ease, border-color 0.3s ease, transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .lead-card--skipped {
      opacity: 0.7;
      border-style: dashed;
      border-color: var(--skipped-border);
    }

    .lead-card--removing {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .lead-card__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .lead-card__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .lead-card__company {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 2px;
      transition: color 0.3s ease;
    }

    .badge {
      border-radius: 999px;
      font-size: 0.78rem;
      line-height: 1;
      padding: 7px 10px;
      font-weight: 700;
      white-space: nowrap;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .badge--source {
      background: var(--chip-bg);
      color: var(--chip-text);
      border: 1px solid var(--chip-border);
    }

    .badge--priority-high {
      background: color-mix(in srgb, var(--high) 15%, transparent);
      color: var(--high);
      border: 1px solid color-mix(in srgb, var(--high) 40%, transparent);
    }

    .badge--priority-medium {
      background: color-mix(in srgb, var(--medium) 15%, transparent);
      color: var(--medium);
      border: 1px solid color-mix(in srgb, var(--medium) 40%, transparent);
    }

    .badge--priority-low {
      background: color-mix(in srgb, var(--low) 15%, transparent);
      color: var(--low);
      border: 1px solid color-mix(in srgb, var(--low) 40%, transparent);
    }

    .badge--status {
      border: 1px solid transparent;
    }

    .badge--status-skipped {
      background: color-mix(in srgb, var(--low) 14%, transparent);
      color: color-mix(in srgb, var(--low) 75%, var(--text-primary) 25%);
      border-color: color-mix(in srgb, var(--low) 36%, transparent);
    }

    .badge--status-qualified {
      background: var(--success-soft);
      color: var(--success-text);
      border-color: color-mix(in srgb, var(--success-soft) 68%, var(--success-text) 32%);
    }

    .badge--status-need-info {
      background: var(--warn-soft);
      color: var(--warn-text);
      border-color: color-mix(in srgb, var(--warn-soft) 68%, var(--warn-text) 32%);
    }

    .badge--status-rejected {
      background: var(--danger-soft);
      color: var(--danger-text);
      border-color: color-mix(in srgb, var(--danger-soft) 68%, var(--danger-text) 32%);
    }

    .score {
      display: grid;
      gap: 6px;
    }

    .score__meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.84rem;
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .score__value {
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .score__track {
      width: 100%;
      height: 8px;
      background: var(--track-bg);
      border-radius: 999px;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }

    .score__bar {
      height: 100%;
      background: linear-gradient(90deg, #8fa2b2 0%, var(--primary) 100%);
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .lead-card__meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .lead-card__actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .lead-card__actions .btn {
      width: 100%;
      min-width: 0;
      white-space: nowrap;
    }

    .lead-card__actions .btn:only-child {
      grid-column: 1 / -1;
    }

    .empty-state {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      color: var(--text-secondary);
      font-size: 0.92rem;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #detail-section {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      gap: 16px;
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .detail__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .detail__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .detail__subtitle {
      color: var(--text-secondary);
      font-size: 0.92rem;
      margin-top: 2px;
      transition: color 0.3s ease;
    }

    .detail-score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .detail-score-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: var(--surface-soft);
      display: grid;
      gap: 8px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .detail-score-card__title {
      font-size: 0.9rem;
      font-weight: 700;
    }

    .detail-priority {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--surface-soft);
      flex-wrap: wrap;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .detail-priority__label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .detail-block {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--surface-soft);
      display: grid;
      gap: 10px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .detail-block__title {
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .criteria-list {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .criteria-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: var(--surface-contrast);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .criteria-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .criteria-item input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .criteria-item__points {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 700;
      transition: color 0.3s ease;
    }

    .maturity-box {
      display: grid;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .script-box {
      border: 1px dashed var(--script-border);
      border-radius: 10px;
      padding: 10px;
      background: var(--surface-contrast);
      color: var(--text-primary);
      font-size: 0.9rem;
      white-space: pre-wrap;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-actions .btn {
      flex: 1;
      min-width: 180px;
    }

    .detail-footer {
      display: flex;
      justify-content: flex-end;
    }

    .toast-container {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 999;
      display: grid;
      gap: 10px;
      pointer-events: none;
      max-width: min(360px, calc(100vw - 24px));
    }

    .toast {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
      font-size: 0.9rem;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .toast--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast--success {
      border-color: color-mix(in srgb, var(--success-soft) 68%, var(--success-text) 32%);
      background: color-mix(in srgb, var(--success-soft) 78%, var(--surface) 22%);
    }

    .toast--warning {
      border-color: color-mix(in srgb, var(--warn-soft) 68%, var(--warn-text) 32%);
      background: color-mix(in srgb, var(--warn-soft) 78%, var(--surface) 22%);
    }

    .toast--danger {
      border-color: color-mix(in srgb, var(--danger-soft) 68%, var(--danger-text) 32%);
      background: color-mix(in srgb, var(--danger-soft) 78%, var(--surface) 22%);
    }

    @media (max-width: 860px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 768px) and (max-width: 1024px) {
      #leadsGrid,
      #skippedGrid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 767px) {
      #leadsGrid,
      #skippedGrid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px 28px;
      }

      .header {
        padding: 16px;
      }

      .brand__logo {
        font-size: 1.25rem;
      }

      .lead-card__actions {
        grid-template-columns: 1fr;
      }

      .lead-card__actions .btn,
      .detail-actions .btn {
        min-width: 100%;
      }

      .toast-container {
        right: 12px;
        left: 12px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <h1 class="brand__logo">LeadLens</h1>
        <p class="brand__tagline">Фокус на важном</p>
      </div>

      <div class="header__actions">
        <button id="themeToggleBtn" class="btn btn--ghost btn--theme" type="button" aria-label="Светлая тема включена. Переключить на тёмную." title="Сменить тему">☀️</button>
        <button id="exportBtn" class="btn btn--ghost" type="button">Export CSV</button>
        <button id="resetBtn" class="btn btn--primary" type="button">Reset</button>
      </div>
    </header>

    <main class="section">
      <div class="section__header">
        <div class="section__title-wrap">
          <h2 class="section__title">📋 Новые лиды</h2>
          <span id="newCountBadge" class="count-badge" aria-label="Количество новых лидов">0</span>
        </div>
      </div>
      <div id="leadsGrid" aria-live="polite"></div>
    </main>

    <section id="skippedSection" class="section section--collapsible" aria-hidden="true">
      <div class="section__header">
        <div class="section__title-wrap">
          <h2 class="section__title">⏳ Отложенные лиды</h2>
          <span id="skippedCountBadge" class="count-badge" aria-label="Количество отложенных лидов">0</span>
        </div>
        <button id="restoreAllBtn" class="btn btn--ghost" type="button" disabled>↩️ Вернуть все</button>
      </div>
      <div id="skippedGrid" aria-live="polite"></div>
    </section>

    <section id="detail-section" aria-hidden="true"></section>

    <!-- Проверка кодировки: Отложенные лиды | Вернуть все | ⏳ Отложенные лиды | ↩️ Вернуть все -->
    <div id="textProbe" hidden>Отложенные лиды | Вернуть все | ⏳ Отложенные лиды | ↩️ Вернуть все | ↩ Вернуть все</div>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script>
    const QUALIFICATION_CRITERIA = [
      { key: "budget_confirmed", label: "Бюджет подтверждён", points: 30 },
      { key: "contact_decision_maker", label: "Контакт — ЛПР", points: 30 },
      { key: "tech_stack_known", label: "Техстек известен", points: 25 },
      { key: "competitor_mentioned", label: "Упомянут конкурент", points: 15 }
    ];

    const STATUS_LABELS = {
      new: "Новый",
      skipped: "Отложен",
      qualified: "Квалифицирован",
      need_info: "Нужна информация",
      rejected: "Отклонён"
    };

    const PRIORITY_LABELS = {
      high: "Высокий 🔥",
      medium: "Средний ⚡",
      low: "Низкий 💤"
    };

    const UI_TEXT = {
      skippedTitle: "⏳ Отложенные лиды",
      restoreAll: "↩️ Вернуть все",
      restoreOne: "↩️ Вернуть"
    };

    const THEME_STORAGE_KEY = "leadlens-theme";
    const THEMES = {
      light: "light",
      dark: "dark"
    };

    const REMOVAL_ANIMATION_MS = 300;

    const initialLeads = [
      { id: 1, name: "Анна Петрова", company: "TechStart LLC", source: "LinkedIn", budget: 75000, timeline: 2, digital_presence: 8, has_website: true, social_active: true, status: "new" },
      { id: 2, name: "Иван Соколов", company: "RetailPro", source: "Сайт", budget: 30000, timeline: 6, digital_presence: 4, has_website: true, social_active: false, status: "new" },
      { id: 3, name: "Мария Иванова", company: "EduFlow", source: "Рекомендация", budget: 120000, timeline: 1, digital_presence: 9, has_website: true, social_active: true, status: "new" },
      { id: 4, name: "Дмитрий Волков", company: "LocalShop", source: "Холодный звонок", budget: 15000, timeline: 12, digital_presence: 2, has_website: false, social_active: false, status: "new" }
    ];

    let leads = cloneLeads(initialLeads);
    let activeLeadId = null;
    let detailDraftCriteria = null;

    const leadsGrid = document.getElementById("leadsGrid");
    const skippedGrid = document.getElementById("skippedGrid");
    const skippedSection = document.getElementById("skippedSection");
    const detailSection = document.getElementById("detail-section");
    const exportBtn = document.getElementById("exportBtn");
    const resetBtn = document.getElementById("resetBtn");
    const restoreAllBtn = document.getElementById("restoreAllBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const newCountBadge = document.getElementById("newCountBadge");
    const skippedCountBadge = document.getElementById("skippedCountBadge");
    const toastContainer = document.getElementById("toastContainer");

    function getDefaultCriteriaState() {
      return { budget_confirmed: false, contact_decision_maker: false, tech_stack_known: false, competitor_mentioned: false };
    }

    function getLeadCriteriaState(lead) {
      return { ...getDefaultCriteriaState(), ...(lead?.qualification_criteria || {}) };
    }

    function cloneLeads(source) {
      return source.map((lead) => ({ ...lead, qualification_criteria: getLeadCriteriaState(lead), qualification_score: Number(lead.qualification_score) || 0 }));
    }

    function normalizeTheme(theme) {
      return theme === THEMES.dark ? THEMES.dark : THEMES.light;
    }

    function setThemeButtonState(theme) {
      if (!themeToggleBtn) return;
      const isDark = theme === THEMES.dark;
      themeToggleBtn.textContent = isDark ? "🌙" : "☀️";
      themeToggleBtn.setAttribute("aria-label", isDark
        ? "Тёмная тема включена. Переключить на светлую."
        : "Светлая тема включена. Переключить на тёмную.");
      themeToggleBtn.setAttribute("title", isDark ? "Тёмная тема" : "Светлая тема");
    }

    function applyTheme(theme, persist = true) {
      const nextTheme = normalizeTheme(theme);
      document.documentElement.setAttribute("data-theme", nextTheme);
      setThemeButtonState(nextTheme);

      if (!persist) return;
      try {
        window.localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
      } catch (error) {
        /* localStorage can be unavailable in private mode */
      }
    }

    function initTheme() {
      let savedTheme = THEMES.light;
      try {
        savedTheme = normalizeTheme(window.localStorage.getItem(THEME_STORAGE_KEY));
      } catch (error) {
        savedTheme = THEMES.light;
      }
      applyTheme(savedTheme, false);
    }

    function toggleTheme() {
      const currentTheme = normalizeTheme(document.documentElement.getAttribute("data-theme"));
      const nextTheme = currentTheme === THEMES.dark ? THEMES.light : THEMES.dark;
      applyTheme(nextTheme, true);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message, tone = "success") {
      if (!toastContainer) return;
      const toast = document.createElement("div");
      toast.className = `toast toast--${tone}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add("toast--visible"));
      window.setTimeout(() => {
        toast.classList.remove("toast--visible");
        window.setTimeout(() => toast.remove(), 320);
      }, 2400);
    }

    function calculatePotentialScore(lead) {
      let score = 0;
      const budget = Number(lead.budget) || 0;
      const timeline = Number(lead.timeline);
      const digitalPresence = Number(lead.digital_presence) || 0;

      if (budget >= 100000) score += 30;
      else if (budget >= 50000) score += 20;
      else if (budget >= 25000) score += 10;

      if (!Number.isNaN(timeline)) {
        if (timeline <= 1) score += 25;
        else if (timeline <= 3) score += 18;
        else if (timeline <= 6) score += 10;
      }

      if (digitalPresence >= 8) score += 25;
      else if (digitalPresence >= 6) score += 18;
      else if (digitalPresence >= 4) score += 10;

      if (lead.has_website) score += 10;
      if (lead.social_active) score += 10;

      return Math.max(0, Math.min(100, score));
    }

    function calculateQualificationScore(criteriaState) {
      const score = QUALIFICATION_CRITERIA.reduce((acc, criterion) => (criteriaState[criterion.key] ? acc + criterion.points : acc), 0);
      return Math.max(0, Math.min(100, score));
    }

    function calculateAveragePriorityScore(potentialScore, qualificationScore) {
      return Math.round((potentialScore + qualificationScore) / 2);
    }

    function getPriorityLabel(score) {
      if (score >= 70) return PRIORITY_LABELS.high;
      if (score >= 40) return PRIORITY_LABELS.medium;
      return PRIORITY_LABELS.low;
    }

    function getPriorityClass(score) {
      if (score >= 70) return "badge--priority-high";
      if (score >= 40) return "badge--priority-medium";
      return "badge--priority-low";
    }

    function getStatusBadge(status) {
      const statusMap = {
        skipped: { label: STATUS_LABELS.skipped, className: "badge--status-skipped" },
        qualified: { label: STATUS_LABELS.qualified, className: "badge--status-qualified" },
        need_info: { label: STATUS_LABELS.need_info, className: "badge--status-need-info" },
        rejected: { label: STATUS_LABELS.rejected, className: "badge--status-rejected" }
      };
      return statusMap[status] || null;
    }

    function getDigitalMaturity(lead) {
      const presence = Number(lead.digital_presence) || 0;
      if (lead.has_website && lead.social_active && presence >= 7) {
        return { level: "high", label: "Высокий", hint: "Сильная цифровая база: можно обсуждать масштабирование и рост конверсии." };
      }
      if ((lead.has_website || lead.social_active) && presence >= 4) {
        return { level: "medium", label: "Средний", hint: "Основа есть: важно выявить узкие места и предложить быстрые улучшения." };
      }
      return { level: "low", label: "Низкий", hint: "Нужен базовый цифровой фундамент: фокус на запуске минимально эффективной системы." };
    }

    function generateCallScript(lead, maturity) {
      if (maturity.level === "high") {
        return `Здравствуйте, ${lead.name}! Вижу, что ${lead.company} уже активно работает в digital. Предлагаю обсудить, где можно ускорить рост заявок и снизить стоимость лида. Подскажите, какая цель приоритетнее на ближайшие 3 месяца?`;
      }
      if (maturity.level === "medium") {
        return `Здравствуйте, ${lead.name}! У ${lead.company} уже есть хорошая база в digital. Я подготовил идеи, как быстро усилить текущие каналы и закрыть пробелы в воронке. Можем пройтись по текущим источникам лидов и приоритетам?`;
      }
      return `Здравствуйте, ${lead.name}! Для ${lead.company} мы можем выстроить понятный и управляемый цифровой контур: сайт, каналы привлечения и базовую аналитику. Давайте начнём с короткого аудита, чтобы выбрать первый шаг с максимальным эффектом.`;
    }

    function getLeadById(leadId) {
      return leads.find((lead) => lead.id === leadId) || null;
    }

    function getCurrentDateSlug() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function toCsvCell(value) {
      return `"${String(value ?? "").replace(/"/g, '""')}"`;
    }

    function renderLeadCard(lead, sectionType) {
      const potentialScore = calculatePotentialScore(lead);
      const criteriaState = getLeadCriteriaState(lead);
      const qualificationScore = calculateQualificationScore(criteriaState);
      const summaryScore = calculateAveragePriorityScore(potentialScore, qualificationScore);
      const priorityLabel = getPriorityLabel(summaryScore);
      const priorityClass = getPriorityClass(summaryScore);
      const isSkippedCard = sectionType === "skipped";
      const statusBadge = getStatusBadge(lead.status);

      const actionsMarkup = isSkippedCard
        ? `<button class="btn btn--ghost" type="button" data-action="return" data-id="${lead.id}">${UI_TEXT.restoreOne}</button>`
        : `
          <button class="btn btn--primary" type="button" data-action="qualify" data-id="${lead.id}">Квалифицировать</button>
          <button class="btn btn--soft" type="button" data-action="skip" data-id="${lead.id}">⏸️ Отложить</button>
        `;

      return `
        <article class="lead-card ${isSkippedCard ? "lead-card--skipped" : ""}" data-id="${lead.id}">
          <div class="lead-card__head">
            <div>
              <h3 class="lead-card__name">${escapeHtml(lead.name)}</h3>
              <p class="lead-card__company">${escapeHtml(lead.company)}</p>
            </div>
            <span class="badge badge--source">${escapeHtml(lead.source)}</span>
          </div>

          <div class="score" aria-label="Потенциал ${potentialScore} из 100">
            <div class="score__meta">
              <span>Потенциал</span>
              <span class="score__value">${potentialScore}/100</span>
            </div>
            <div class="score__track">
              <div class="score__bar" style="width: ${potentialScore}%;"></div>
            </div>
          </div>

          <div class="lead-card__meta">
            <span class="badge ${priorityClass}">${priorityLabel}</span>
            ${statusBadge ? `<span class="badge badge--status ${statusBadge.className}">${statusBadge.label}</span>` : ""}
          </div>

          <div class="lead-card__actions">${actionsMarkup}</div>
        </article>
      `;
    }

    function updateLeadSectionMeta(activeLeadsCount, skippedLeadsCount) {
      newCountBadge.textContent = String(activeLeadsCount);
      skippedCountBadge.textContent = String(skippedLeadsCount);
      restoreAllBtn.disabled = skippedLeadsCount === 0;

      if (skippedLeadsCount > 0) {
        skippedSection.classList.add("is-visible");
        skippedSection.setAttribute("aria-hidden", "false");
        return;
      }

      skippedSection.classList.remove("is-visible");
      skippedSection.setAttribute("aria-hidden", "true");
    }

    function renderLeads() {
      if (!Array.isArray(leads) || leads.length === 0) {
        leadsGrid.innerHTML = '<div class="empty-state">Нет новых лидов</div>';
        skippedGrid.innerHTML = "";
        updateLeadSectionMeta(0, 0);
        return;
      }

      const activeLeads = leads.filter((lead) => !["skipped", "qualified", "rejected"].includes(lead.status));
      const skippedLeads = leads.filter((lead) => lead.status === "skipped");

      leadsGrid.innerHTML = activeLeads.length
        ? activeLeads.map((lead) => renderLeadCard(lead, "new")).join("")
        : '<div class="empty-state">Нет новых лидов</div>';

      skippedGrid.innerHTML = skippedLeads.length
        ? skippedLeads.map((lead) => renderLeadCard(lead, "skipped")).join("")
        : "";

      updateLeadSectionMeta(activeLeads.length, skippedLeads.length);
    }

    function refreshDetailMetrics() {
      if (activeLeadId === null || !detailDraftCriteria) return;
      const lead = getLeadById(activeLeadId);
      if (!lead) return;

      const potentialScore = calculatePotentialScore(lead);
      const qualificationScore = calculateQualificationScore(detailDraftCriteria);
      const avgPriorityScore = calculateAveragePriorityScore(potentialScore, qualificationScore);
      const priorityLabel = getPriorityLabel(avgPriorityScore);
      const priorityClass = getPriorityClass(avgPriorityScore);

      const qualificationValueEl = detailSection.querySelector("#detailQualificationValue");
      const qualificationBarEl = detailSection.querySelector("#detailQualificationBar");
      const priorityBadgeEl = detailSection.querySelector("#detailPriorityBadge");

      if (qualificationValueEl) qualificationValueEl.textContent = `${qualificationScore}/100`;
      if (qualificationBarEl) qualificationBarEl.style.width = `${qualificationScore}%`;
      if (priorityBadgeEl) {
        priorityBadgeEl.className = `badge ${priorityClass}`;
        priorityBadgeEl.textContent = `${priorityLabel} • ${avgPriorityScore}/100`;
      }
    }

    function openLeadDetail(leadId) {
      const lead = getLeadById(leadId);
      if (!lead) return;

      activeLeadId = lead.id;
      detailDraftCriteria = getLeadCriteriaState(lead);

      const potentialScore = calculatePotentialScore(lead);
      const qualificationScore = calculateQualificationScore(detailDraftCriteria);
      const avgPriorityScore = calculateAveragePriorityScore(potentialScore, qualificationScore);
      const priorityLabel = getPriorityLabel(avgPriorityScore);
      const priorityClass = getPriorityClass(avgPriorityScore);
      const maturity = getDigitalMaturity(lead);
      const callScript = generateCallScript(lead, maturity);

      const criteriaMarkup = QUALIFICATION_CRITERIA.map((criterion) => `
        <li class="criteria-item">
          <label>
            <input type="checkbox" data-criteria-key="${criterion.key}" ${detailDraftCriteria[criterion.key] ? "checked" : ""} />
            <span>${criterion.label}</span>
          </label>
          <span class="criteria-item__points">+${criterion.points}</span>
        </li>
      `).join("");

      detailSection.innerHTML = `
        <div class="detail__header">
          <div>
            <h3 class="detail__title">${escapeHtml(lead.name)} — ${escapeHtml(lead.company)}</h3>
            <p class="detail__subtitle">Источник: ${escapeHtml(lead.source)} · Статус: ${escapeHtml(STATUS_LABELS[lead.status] || STATUS_LABELS.new)}</p>
          </div>
        </div>

        <div class="detail-score-grid">
          <article class="detail-score-card">
            <h4 class="detail-score-card__title">🎯 Оценка потенциала</h4>
            <div class="score__meta"><span>Оценка по данным</span><strong class="score__value">${potentialScore}/100</strong></div>
            <div class="score__track"><div class="score__bar" style="width: ${potentialScore}%;"></div></div>
          </article>
          <article class="detail-score-card">
            <h4 class="detail-score-card__title">✅ Оценка квалификации</h4>
            <div class="score__meta"><span>Оценка по критериям</span><strong class="score__value" id="detailQualificationValue">${qualificationScore}/100</strong></div>
            <div class="score__track"><div class="score__bar" id="detailQualificationBar" style="width: ${qualificationScore}%;"></div></div>
          </article>
        </div>

        <div class="detail-priority">
          <span class="detail-priority__label">🔥 Приоритет: среднее двух оценок</span>
          <span id="detailPriorityBadge" class="badge ${priorityClass}">${priorityLabel} • ${avgPriorityScore}/100</span>
        </div>

        <div class="detail-grid">
          <article class="detail-block">
            <h4 class="detail-block__title">Критерии квалификации</h4>
            <ul class="criteria-list">${criteriaMarkup}</ul>
          </article>

          <article class="detail-block">
            <h4 class="detail-block__title">📊 Цифровая зрелость: ${maturity.label}</h4>
            <div class="maturity-box">
              <p>${maturity.hint}</p>
              <p><strong>Сайт:</strong> ${lead.has_website ? "Да" : "Нет"}</p>
              <p><strong>Соцсети:</strong> ${lead.social_active ? "Активны" : "Неактивны"}</p>
              <p><strong>Digital Presence:</strong> ${escapeHtml(lead.digital_presence)}/10</p>
            </div>
            <h4 class="detail-block__title">💬 Скрипт звонка</h4>
            <div class="script-box">${escapeHtml(callScript)}</div>
          </article>
        </div>

        <div class="detail-actions">
          <button class="btn btn--success" type="button" data-detail-action="qualified">✅ Квалифицирован</button>
          <button class="btn btn--warning" type="button" data-detail-action="need_info">⏳ Нужна информация</button>
          <button class="btn btn--danger" type="button" data-detail-action="rejected">❌ Отклонить</button>
        </div>

        <div class="detail-footer">
          <button id="closeDetailBtn" class="btn btn--ghost" type="button">Закрыть</button>
        </div>
      `;

      detailSection.style.display = "grid";
      detailSection.setAttribute("aria-hidden", "false");
      detailSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function closeLeadDetail() {
      activeLeadId = null;
      detailDraftCriteria = null;
      detailSection.style.display = "none";
      detailSection.setAttribute("aria-hidden", "true");
      detailSection.innerHTML = "";
    }

    function animateLeadRemoval(leadId, onComplete) {
      const leadCard = leadsGrid.querySelector(`.lead-card[data-id="${leadId}"]`);
      if (!leadCard) {
        onComplete();
        return;
      }

      leadCard.classList.add("lead-card--removing");
      window.setTimeout(onComplete, REMOVAL_ANIMATION_MS);
    }

    function saveQualificationDecision(decisionStatus) {
      if (activeLeadId === null || !detailDraftCriteria) return;

      const leadIdToUpdate = activeLeadId;
      const criteriaToSave = { ...detailDraftCriteria };
      const qualificationScore = calculateQualificationScore(criteriaToSave);
      const shouldAnimateRemoval = decisionStatus === "qualified" || decisionStatus === "rejected";

      closeLeadDetail();

      const applyDecision = () => {
        leads = leads.map((lead) => (lead.id === leadIdToUpdate
          ? { ...lead, status: decisionStatus, qualification_criteria: criteriaToSave, qualification_score: qualificationScore }
          : lead));

        renderLeads();
        showToast(`Статус лида обновлён: ${STATUS_LABELS[decisionStatus]}.`, "success");
      };

      if (shouldAnimateRemoval) {
        animateLeadRemoval(leadIdToUpdate, applyDecision);
        return;
      }

      applyDecision();
    }

    function skipLead(leadId) {
      let leadName = "";
      let changed = false;

      leads = leads.map((lead) => {
        if (lead.id === leadId && lead.status === "new") {
          leadName = lead.name;
          changed = true;
          return { ...lead, status: "skipped" };
        }
        return lead;
      });

      if (!changed) return;
      if (activeLeadId === leadId) closeLeadDetail();
      renderLeads();
      if (leadName) showToast(`Лид «${leadName}» отложен.`, "warning");
    }

    function restoreLead(leadId) {
      let leadName = "";
      let changed = false;

      leads = leads.map((lead) => {
        if (lead.id === leadId && lead.status === "skipped") {
          leadName = lead.name;
          changed = true;
          return { ...lead, status: "new" };
        }
        return lead;
      });

      if (!changed) return;
      renderLeads();
      if (leadName) showToast(`Лид «${leadName}» возвращён в новые.`, "success");
    }

    function restoreAllSkippedLeads() {
      const skippedLeads = leads.filter((lead) => lead.status === "skipped");
      if (!skippedLeads.length) return;

      leads = leads.map((lead) => (lead.status === "skipped" ? { ...lead, status: "new" } : lead));
      renderLeads();
      showToast(`Возвращено лидов: ${skippedLeads.length}.`, "success");
    }

    function exportLeadsToCsv() {
      const headers = ["Имя", "Компания", "Источник", "Бюджет", "Время_мин", "Потенциал", "Квалификация", "Приоритет", "Статус"];

      const rows = leads.map((lead) => {
        const potentialScore = calculatePotentialScore(lead);
        const criteriaState = getLeadCriteriaState(lead);
        const qualificationScore = calculateQualificationScore(criteriaState);
        const priorityAverage = calculateAveragePriorityScore(potentialScore, qualificationScore);
        return [lead.name, lead.company, lead.source, lead.budget, lead.timeline, potentialScore, qualificationScore, getPriorityLabel(priorityAverage), STATUS_LABELS[lead.status] || STATUS_LABELS.new];
      });

      const csvContent = [headers, ...rows].map((row) => row.map(toCsvCell).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `лиды_${getCurrentDateSlug()}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast("CSV-файл успешно экспортирован.", "success");
    }

    leadsGrid.addEventListener("click", (event) => {
      const actionButton = event.target.closest("button[data-action]");
      if (!actionButton) return;
      const action = actionButton.getAttribute("data-action");
      const leadId = Number(actionButton.getAttribute("data-id"));
      if (Number.isNaN(leadId)) return;
      if (action === "qualify") openLeadDetail(leadId);
      if (action === "skip") skipLead(leadId);
    });

    skippedGrid.addEventListener("click", (event) => {
      const actionButton = event.target.closest("button[data-action]");
      if (!actionButton) return;
      const action = actionButton.getAttribute("data-action");
      const leadId = Number(actionButton.getAttribute("data-id"));
      if (Number.isNaN(leadId)) return;
      if (action === "return") restoreLead(leadId);
    });

    detailSection.addEventListener("change", (event) => {
      const checkbox = event.target.closest("input[data-criteria-key]");
      if (!checkbox || !detailDraftCriteria) return;
      const criterionKey = checkbox.getAttribute("data-criteria-key");
      if (!criterionKey || !(criterionKey in detailDraftCriteria)) return;
      detailDraftCriteria = { ...detailDraftCriteria, [criterionKey]: checkbox.checked };
      refreshDetailMetrics();
    });

    detailSection.addEventListener("click", (event) => {
      if (event.target.closest("#closeDetailBtn")) {
        closeLeadDetail();
        return;
      }
      const decisionButton = event.target.closest("button[data-detail-action]");
      if (!decisionButton) return;
      const detailAction = decisionButton.getAttribute("data-detail-action");
      if (detailAction === "qualified" || detailAction === "need_info" || detailAction === "rejected") {
        saveQualificationDecision(detailAction);
      }
    });

    exportBtn.addEventListener("click", exportLeadsToCsv);
    restoreAllBtn.addEventListener("click", restoreAllSkippedLeads);
    if (themeToggleBtn) {
      themeToggleBtn.addEventListener("click", toggleTheme);
    }

    resetBtn.addEventListener("click", () => {
      leads = cloneLeads(initialLeads);
      closeLeadDetail();
      renderLeads();
      showToast("Данные восстановлены: использованы исходные мок-лиды.", "success");
    });

    restoreAllBtn.textContent = UI_TEXT.restoreAll;
    initTheme();
    renderLeads();
  </script>
</body>
</html>
